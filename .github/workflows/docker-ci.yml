name: Docker CI

# Multi-arch build validation (amd64 + arm64 under QEMU) — the SLOW build, so it runs only
# where multi-arch correctness matters: PRs and main. Per-branch coverage is handled by
# smoke-test.yml (native amd64 build + full integration run on every branch). Version tags
# (v*) are handled separately by docker-publish.yml, which builds AND pushes.
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: docker-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  buildandpush:
    runs-on: ubuntu-latest
    steps:

      # https://github.com/marketplace/actions/checkout
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true

      # https://github.com/docker/setup-qemu-action#usage
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      # https://github.com/marketplace/actions/docker-setup-buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # https://github.com/docker/build-push-action#multi-platform-image
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
