name: Smoke test

# Runs in tandem with Docker CI on every branch and PR. Docker CI proves the image
# *builds* (multi-arch); this proves a change (e.g. a Lidarr/Deemix version bump from the
# auto-update bot) didn't break the custom integration on top (Caddy proxy, track-picker
# sidecar, UI injection, Lidarr autoconfig).
# Most checks need no credentials (a dummy ARL unblocks autoconfig). The Deemix indexer +
# download-client checks need a real ARL: set the DEEZER_ARL repo secret to enable them,
# otherwise they're skipped. See .github/scripts/smoke-test.sh for details.
on:
  # Run on EVERY branch push (feature branches + the auto-update bot's auto-update/* branches)
  # to prove the full integration end-to-end, not just that the image builds.
  #
  # CAVEAT: paths-ignore skips the ~15-30min build on docs-only changes. Do NOT promote
  # smoke-test to a REQUIRED status check while paths-ignore is set — a docs-only PR would be
  # skipped, never report the check, and be blocked from merging. If you require it, remove
  # paths-ignore (or add an always-green gate job that reports the required context).
  push:
    branches: ['**']
    paths-ignore: ['**.md', 'LICENSE', '.github/ISSUE_TEMPLATE/**']
  # pull_request adds coverage for FORK PRs only (their code never lands as a push in this
  # repo). Same-repo PRs are already covered by their branch push above — the job-level `if`
  # below drops the duplicate so each commit is smoke-tested exactly once.
  pull_request:
    paths-ignore: ['**.md', 'LICENSE', '.github/ISSUE_TEMPLATE/**']
  workflow_dispatch:

concurrency:
  # Keyed by PR number when it's a PR, else the branch ref; cancels a superseded ~30-min build.
  group: smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    # Push covers same-repo branches; pull_request only earns its keep for forks. This guard
    # means same-repo PRs don't build twice (once for push, once for pull_request).
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Optional. Set this repo secret to a real 192-char Deezer ARL to enable the indexer +
      # download-client checks (they're validated against Deezer, so a dummy can't create them).
      # Empty when unset → the script injects a dummy ARL and skips those two checks.
      DEEZER_ARL: ${{ secrets.DEEZER_ARL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true # lidarr-flac2mp3 is a submodule

      # Native amd64 build, loaded straight into the runner's Docker daemon so we can run it.
      # No QEMU/buildx needed; arm64 build correctness stays covered by docker-ci.yml.
      - name: Build image
        run: docker build -t lidarr-on-steroids:smoke .

      - name: Start container
        run: |
          docker run -d --name los \
            -p 8686:8686 -p 6595:6595 \
            -e FLAC2CUSTOM_ARGS='-a "-vn -c:a libopus -b:a 64k" -e .opus -r \.mp3$' \
            lidarr-on-steroids:smoke

      # Unblock autoconfig: setup/run waits for a 192-char arl in login.json. A dummy is enough
      # for everything except the Deezer-validated indexer/download-client saves — those need a
      # real ARL (DEEZER_ARL secret). REAL_ARL is exported so the script knows which to assert.
      - name: Inject ARL
        run: |
          if [ -n "$DEEZER_ARL" ]; then
            ARL=$(printf '%s' "$DEEZER_ARL" | tr -d '[:space:]')
            echo "REAL_ARL=1" >> "$GITHUB_ENV"
            echo "Using real Deezer ARL from secret (length=${#ARL})."
            if [ "${#ARL}" -ne 192 ]; then
              echo "WARNING: ARL length is ${#ARL}, expected 192 — autoconfig may not unblock."
            fi
          else
            ARL=$(printf 'a%.0s' $(seq 1 192))
            echo "REAL_ARL=0" >> "$GITHUB_ENV"
            echo "No DEEZER_ARL secret set; using dummy ARL (indexer/download-client checks will be skipped)."
          fi
          for i in $(seq 1 10); do
            if docker exec -e ARL="$ARL" los sh -c 'printf "{\"arl\":\"%s\"}" "$ARL" > /config_deemix/login.json'; then
              echo "ARL written."; exit 0
            fi
            echo "Container not ready yet ($i)..."; sleep 1
          done
          echo "ERROR: could not write ARL into container."; exit 1

      - name: Run smoke assertions
        run: bash .github/scripts/smoke-test.sh

      - name: Container logs (on failure)
        if: failure()
        run: docker logs los 2>&1 || true

      - name: Cleanup
        if: always()
        run: docker rm -f los || true
